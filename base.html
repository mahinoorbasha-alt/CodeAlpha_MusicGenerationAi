<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Music Generation with AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-orbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <nav class="navbar glass">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-mark">♪</span>
      <span>AI Music Gen</span>
    </a>
    <ul class="nav-links">
      <li><a href="{{ url_for('home') }}">Home</a></li>
      <li><a href="{{ url_for('upload_page') }}">Upload Dataset</a></li>
      <li><a href="{{ url_for('train_page') }}">Train Model</a></li>
      <li><a href="{{ url_for('generate_page') }}">Generate Music</a></li>
      <li><a href="{{ url_for('about_page') }}">About</a></li>
    </ul>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>© 2025 Music Generation with AI · CodeAlpha Internship</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
